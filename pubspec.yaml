name: asmr_battle_factory
description: Professional ASMR Generator Tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.3
  
  # DI
  get_it: ^7.6.7
  injectable: ^2.3.2
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # UI & Responsive
  flutter_screenutil: ^5.9.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  
  # Utilities
  logger: ^2.0.2
  easy_localization: ^3.0.3
  dio: ^5.4.0
  equatable: ^2.0.5
  path_provider: ^2.1.1
  uuid: ^4.2.2
  dartz: ^0.10.1
  flutter_markdown: ^0.7.7+1
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.2
  animations: ^2.1.1
  font_awesome_flutter: ^10.12.0
  local_auth: ^2.3.0
  crypto: ^3.0.5
  collection: ^1.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  fluttertoast: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_app.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/images/
    - assets/images/onboarding/
    - assets/docs/
    - assets/data/
